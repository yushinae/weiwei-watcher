name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run lint        # tsc --noEmit (incl. noUnusedLocals)
      - name: Lint (react-hooks)
        run: npm run lint:eslint # rules-of-hooks errors fail; exhaustive-deps warn
      - name: Unit tests
        run: npm test            # vitest run
