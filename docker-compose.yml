services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d nexus" ]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build:
      context: ./server
    env_file:
      - ./server/.env
    environment:
      PORT: 8787
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nexus
      CORS_ORIGIN: http://localhost:3000
      ENABLE_COLLECTORS: "true"
      BYBIT_BASE_COINS: BTC,ETH
      DERIBIT_CURRENCIES: BTC,ETH
      # BYBIT_SYMBOLS: ""   # 可先留空；后续由 instruments bootstrap + 订阅策略补齐
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8787:8787"
    command: [ "sh", "-c", "npm run migrate && npm run dev" ]

volumes:
  nexus_pgdata:
